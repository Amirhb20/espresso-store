<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>coffee shop</title>
    <link rel="stylesheet" href="./style/app.css" />
    <link rel="stylesheet" href="./swiper config/swiper-bundle.min.css" />
    <link rel="icon" type="image/png" href="./image/icon site.png" />
  </head>
  <body class="bg-[url('../image/headerimage.png')] bg-cover bg-no-repeat">
    <!-- use svg -->
    <svg class="hidden">
      <symbol
        id="search"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="size-6"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
        />
      </symbol>
    </svg>
    <header class="header pt-14">
      <div class="container">
        <div class="flex items-center justify-between">
          <!-- Logo -->
          <h2 class="font-PlayfairDisplay-Bold text-32 text-white">Coffea</h2>

          <!-- Menu -->
          <ul
            class="flex items-center gap-10 **:font-Poppins-Medium **:uppercase **:text-white"
          >
            <li><a href="#" class="nav-link">Home</a></li>
            <li><a href="#" class="nav-link">Coffee</a></li>
            <li><a href="#" class="nav-link">Bakery</a></li>
            <li><a href="#" class="nav-link">Shop</a></li>
            <li><a href="#" class="nav-link">About</a></li>
            <li><a href="#" class="nav-link">Login</a></li>
          </ul>

          <!-- search box -->
          <div class="relative flex items-center">
            <div class="search-wrapper">
              <input
                type="text"
                placeholder="Search..."
                class="search-input outline-none"
              />

              <button class="search-btn">
                <svg class="w-6 h-6">
                  <use href="#search"></use>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>
    </header>
    <!-- main -->
    <main class="main">
      <section class="hero">
        <div class="container min-h-[calc(100vh-104px)] flex items-center">
          <!-- hero content wrapper -->
          <div>
            <!-- hero content title -->
            <h3
              class="hero-welcome font-Outfit-Medium text-2xl text-white uppercase"
            >
              wellcome
            </h3>
            <!-- hero content title -->
            <h1
              class="font-PlayfairDisplay-Bold text-7xl max-w-152 mt-6 mb-10 text-white"
            >
              We serve the richest coffee in the city!
            </h1>
            <!-- hero content paragraph -->
            <p class="font-Outfit-Regular text-lg max-w-108 mb-10 text-white">
              Lorem ipsum dolor sit amet, consectetur adipisicing elit, sed do
              eiusmod tempor
            </p>
            <!-- hero content btn -->

            <button class="font-Outfit-Medium bg-white btn-primary">
              Order Now
            </button>
          </div>
        </div>
      </section>
    </main>
    <script src="./swiper config/swiper-bundle.min.js"></script>
    <script src="./script/app.js"></script>
  </body>
</html>
